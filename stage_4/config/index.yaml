index:
  # FAISS 索引类型: "Flat" (精确搜索)
  # 咱们目前数据量小，Flat 就够了，精度最高
  type: "Flat" 
  metric: "L2" # 欧氏距离 (对于归一化向量，等价于余弦相似度排序)
  dim: 128

paths:
  # 模型权重路径 (相对于 stage_4 目录)
  model_checkpoint: "../stage_3/outputs/exp_minimal/best.ckpt"
  # 数据集根目录
  data_root: "../stage_2/data/prepared"
  # 索引保存目录
  index_dir: "data/index"
  # 索引文件名
  index_file: "vector.index"
  # 元数据文件名
  meta_file: "meta.pkl"

model:
  backbone: "resnet18"
  embedding_dim: 128
  image_size: 224
